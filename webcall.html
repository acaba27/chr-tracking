<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CH Robinson – Track & Trace</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f4f6f9;
    }
    h1 { color: #1a1a2e; }
    p { color: #555; margin-bottom: 2rem; }
    button {
      padding: 16px 40px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #startBtn { background: #0066cc; color: white; }
    #startBtn:hover { background: #0055aa; }
    #endBtn { background: #cc0000; color: white; display: none; margin-top: 12px; }
    #status {
      margin-top: 1.5rem;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>🚚 CH Robinson – Shipment Tracking</h1>
  <p>Click the button to speak with our AI tracking agent</p>

  <button id="startBtn" onclick="startCall()">📞 Start Call</button>
  <button id="endBtn" onclick="endCall()">📵 End Call</button>
  <div id="status">Ready</div>

  <script>
    var API_KEY = TU_API_KEY
    var USE_CASE_ID = "019d6865-9b19-7d47-afef-75e593ac69ef";

    var callId = null;

    async function startCall() {
      document.getElementById("status").innerText = "Starting call...";
      document.getElementById("startBtn").disabled = true;

      try {
        // Inicia la llamada web via API
        const res = await fetch("https://app.happyrobot.ai/api/v1/dial/web", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "authorization": API_KEY
          },
          body: JSON.stringify({
            use_case_id: USE_CASE_ID,
            language: "en-US"
          })
        });

        const data = await res.json();
        console.log("Call response:", data);

        if (data.id) {
          callId = data.id;
          document.getElementById("status").innerText = "✅ Call connected — speak now";
          document.getElementById("endBtn").style.display = "inline-block";
          document.getElementById("startBtn").style.display = "none";
        } else {
          document.getElementById("status").innerText = "❌ Error: " + JSON.stringify(data);
          document.getElementById("startBtn").disabled = false;
        }
      } catch (err) {
        document.getElementById("status").innerText = "❌ Error: " + err.message;
        document.getElementById("startBtn").disabled = false;
      }
    }

    async function endCall() {
      if (!callId) return;
      document.getElementById("status").innerText = "Ending call...";

      await fetch(`https://app.happyrobot.ai/api/v1/calls/${callId}/end`, {
        method: "POST",
        headers: { "authorization": API_KEY }
      });

      document.getElementById("status").innerText = "Call ended";
      document.getElementById("endBtn").style.display = "none";
      document.getElementById("startBtn").style.display = "inline-block";
      document.getElementById("startBtn").disabled = false;
    }
  </script>
</body>
</html>
